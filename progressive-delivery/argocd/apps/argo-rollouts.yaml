apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: progressive-delivery
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: delivery

  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-rollouts
      targetRevision: 2.37.7
      helm:
        releaseName: argo-rollouts
        valueFiles:
          - $values/helm-values/argo-rollouts/base.yaml
          - $values/helm-values/argo-rollouts/prod.yaml
    - repoURL: https://github.com/cokee96/kubernetes-modules
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
