apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-bluegreen
  namespace: apps
  labels:
    app: demo-bluegreen
    app.kubernetes.io/part-of: progressive-delivery
spec:
  selector:
    matchLabels:
      app: demo-bluegreen
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
      honorLabels: true
