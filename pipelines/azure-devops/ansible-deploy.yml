trigger: none  # Manual trigger only

pr: none

parameters:
  - name: environment
    displayName: "Target environment"
    type: string
    default: dev
    values: [dev, pre, prod]

  - name: imageTag
    displayName: "Image tag (leave empty to use build ID)"
    type: string
    default: ""

  - name: ansibleTags
    displayName: "Ansible tags (leave empty for full deploy)"
    type: string
    default: ""

variables:
  - group: ansible-global           # REGISTRY_HOST, APP_NAME
  - name: EFFECTIVE_TAG
    value: ${{ coalesce(parameters.imageTag, '$(Build.BuildId)') }}
  - name: FULL_IMAGE
    value: "$(REGISTRY_HOST)/$(APP_NAME):$(EFFECTIVE_TAG)"
  - name: INVENTORY_PATH
    value: "ansible/inventories/${{ parameters.environment }}/hosts.ini"

  # Per-env groups: REGISTRY_USER, REGISTRY_PASSWORD, SSH_PRIVATE_KEY
  - ${{ if eq(parameters.environment, 'dev') }}:
    - group: ansible-dev
  - ${{ if eq(parameters.environment, 'pre') }}:
    - group: ansible-pre
  - ${{ if eq(parameters.environment, 'prod') }}:
    - group: ansible-prod

stages:
  # ─────────────────────────────────────────────────────────
  # STAGE 1 — Build and push image
  # ─────────────────────────────────────────────────────────
  - stage: Build
    displayName: "Build & Push (${{ parameters.environment }})"
    jobs:
      - job: build_image
        displayName: "Docker build + registry push"
        pool:
          vmImage: ubuntu-latest

        steps:
          - checkout: self

          - task: Docker@2
            displayName: "Login to registry"
            inputs:
              command: login
              containerRegistry: "onpremise-registry-connection"

          - task: Docker@2
            displayName: "Build image"
            inputs:
              command: build
              repository: "$(REGISTRY_HOST)/$(APP_NAME)"
              dockerfile: "$(Build.SourcesDirectory)/Dockerfile"
              buildContext: "$(Build.SourcesDirectory)"
              tags: |
                $(EFFECTIVE_TAG)
                latest

          - task: Docker@2
            displayName: "Push image"
            inputs:
              command: push
              repository: "$(REGISTRY_HOST)/$(APP_NAME)"
              containerRegistry: "onpremise-registry-connection"
              tags: |
                $(EFFECTIVE_TAG)
                latest

          - bash: |
              echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]$(EFFECTIVE_TAG)"
            name: set_tag
            displayName: "Export image tag"

  # ─────────────────────────────────────────────────────────
  # STAGE 2 — Deploy with Ansible
  #
  # The Ansible playbook at ansible/playbooks/deploy.yml connects
  # to the target servers via SSH, pulls the image and restarts
  # the service (docker compose, systemd, or plain docker).
  #
  # Secrets needed in the variable group (mark as secret):
  #   SSH_PRIVATE_KEY  — private key for the deploy user
  #
  # Approval gate:
  #   Pipelines → Environments → dev/pre/prod → Approvals and checks
  # ─────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: "Ansible Deploy (${{ parameters.environment }})"
    dependsOn: Build
    variables:
      IMAGE_TAG: $[ stageDependencies.Build.build_image.outputs['set_tag.IMAGE_TAG'] ]

    jobs:
      - deployment: ansible_deploy
        displayName: "ansible-playbook deploy"
        pool:
          vmImage: ubuntu-latest
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - bash: pip install --quiet ansible
                  displayName: "Install Ansible"

                - bash: |
                    mkdir -p "$HOME/.ssh"
                    echo "$(SSH_PRIVATE_KEY)" > "$HOME/.ssh/id_rsa"
                    chmod 600 "$HOME/.ssh/id_rsa"
                    echo "StrictHostKeyChecking no" >> "$HOME/.ssh/config"
                    echo "UserKnownHostsFile /dev/null"  >> "$HOME/.ssh/config"
                  displayName: "Set up SSH key"
                  env:
                    SSH_PRIVATE_KEY: $(SSH_PRIVATE_KEY)

                - bash: |
                    TAGS_ARG=""
                    if [ -n "${{ parameters.ansibleTags }}" ]; then
                      TAGS_ARG="--tags ${{ parameters.ansibleTags }}"
                    fi

                    ansible-playbook \
                      ansible/playbooks/deploy.yml \
                      --inventory "$(INVENTORY_PATH)" \
                      --extra-vars "image=$(FULL_IMAGE) app_name=$(APP_NAME) env=${{ parameters.environment }}" \
                      $TAGS_ARG \
                      --diff
                  displayName: "Run Ansible playbook"

                - bash: rm -f "$HOME/.ssh/id_rsa"
                  displayName: "Clean up SSH key"
                  condition: always()
