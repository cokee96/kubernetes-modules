trigger: none  # Manual trigger only

pr: none

parameters:
  - name: environment
    displayName: "Target environment"
    type: string
    default: dev
    values: [dev, pre, prod]

  - name: imageTag
    displayName: "Image tag (leave empty to use build ID)"
    type: string
    default: ""

variables:
  - group: k8s-onpremise-global   # REGISTRY_HOST, APP_NAME
  - name: EFFECTIVE_TAG
    value: ${{ coalesce(parameters.imageTag, '$(Build.BuildId)') }}
  - name: NAMESPACE
    value: "$(APP_NAME)-${{ parameters.environment }}"
  - name: FULL_IMAGE
    value: "$(REGISTRY_HOST)/$(APP_NAME):$(EFFECTIVE_TAG)"

  # Per-environment variable groups — each contains REGISTRY_USER, REGISTRY_PASSWORD, KUBECONFIG_B64
  - ${{ if eq(parameters.environment, 'dev') }}:
    - group: k8s-onpremise-dev
  - ${{ if eq(parameters.environment, 'pre') }}:
    - group: k8s-onpremise-pre
  - ${{ if eq(parameters.environment, 'prod') }}:
    - group: k8s-onpremise-prod

stages:
  # ─────────────────────────────────────────────────────────
  # STAGE 1 — Build and push image to on-premise registry
  # ─────────────────────────────────────────────────────────
  - stage: Build
    displayName: "Build & Push (${{ parameters.environment }})"
    jobs:
      - job: build_image
        displayName: "Docker build + registry push"
        pool:
          vmImage: ubuntu-latest

        steps:
          - checkout: self

          - task: Docker@2
            displayName: "Login to on-premise registry"
            inputs:
              command: login
              containerRegistry: "onpremise-registry-connection"  # Docker Registry service connection

          - task: Docker@2
            displayName: "Build image"
            inputs:
              command: build
              repository: "$(REGISTRY_HOST)/$(APP_NAME)"
              dockerfile: "$(Build.SourcesDirectory)/Dockerfile"
              buildContext: "$(Build.SourcesDirectory)"
              tags: |
                $(EFFECTIVE_TAG)
                latest

          - task: Docker@2
            displayName: "Push image"
            inputs:
              command: push
              repository: "$(REGISTRY_HOST)/$(APP_NAME)"
              containerRegistry: "onpremise-registry-connection"
              tags: |
                $(EFFECTIVE_TAG)
                latest

          - bash: |
              echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]$(EFFECTIVE_TAG)"
            name: set_tag
            displayName: "Export image tag"

  # ─────────────────────────────────────────────────────────
  # STAGE 2 — Deploy to on-premise Kubernetes
  #
  # Authentication: KUBECONFIG_B64 from the per-environment variable group.
  # The variable group must mark KUBECONFIG_B64 as a secret.
  # To generate: base64 -w0 ~/.kube/config
  #
  # Approval gate:
  #   Pipelines → Environments → dev/pre/prod → Approvals and checks
  # ─────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy (${{ parameters.environment }})"
    dependsOn: Build
    variables:
      IMAGE_TAG: $[ stageDependencies.Build.build_image.outputs['set_tag.IMAGE_TAG'] ]

    jobs:
      - deployment: deploy_k8s
        displayName: "kubectl deploy"
        pool:
          vmImage: ubuntu-latest
        # Azure DevOps Environment — configure required approvers here
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Decode kubeconfig from the variable group secret
                - bash: |
                    mkdir -p "$HOME/.kube"
                    echo "$(KUBECONFIG_B64)" | base64 -d > "$HOME/.kube/config"
                    chmod 600 "$HOME/.kube/config"
                    kubectl cluster-info --request-timeout=10s
                  displayName: "Configure kubectl"
                  env:
                    KUBECONFIG_B64: $(KUBECONFIG_B64)

                # Show what will change before the actual deploy
                - bash: |
                    echo "=== Diff before deploy ==="
                    kubectl diff -f - <<EOF || true
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: $(APP_NAME)
                      namespace: $(NAMESPACE)
                    spec:
                      template:
                        spec:
                          containers:
                          - name: $(APP_NAME)
                            image: $(REGISTRY_HOST)/$(APP_NAME):$(IMAGE_TAG)
                    EOF
                  displayName: "Show diff (kubectl diff)"
                  continueOnError: true

                # Use the generic Kubernetes task (no Azure auth required — kubeconfig is already set)
                - task: Kubernetes@1
                  displayName: "kubectl set image"
                  inputs:
                    connectionType: None           # uses KUBECONFIG env var / file
                    namespace: $(NAMESPACE)
                    command: set
                    arguments: >
                      image deployment/$(APP_NAME)
                      $(APP_NAME)=$(REGISTRY_HOST)/$(APP_NAME):$(IMAGE_TAG)

                - task: Kubernetes@1
                  displayName: "kubectl rollout status"
                  inputs:
                    connectionType: None
                    namespace: $(NAMESPACE)
                    command: rollout
                    arguments: "status deployment/$(APP_NAME) --timeout=5m"

                - task: Kubernetes@1
                  displayName: "Show pods"
                  inputs:
                    connectionType: None
                    namespace: $(NAMESPACE)
                    command: get
                    arguments: "pods -o wide"

                - bash: rm -f "$HOME/.kube/config"
                  displayName: "Clean up kubeconfig"
                  condition: always()

            on:
              failure:
                steps:
                  - bash: |
                      mkdir -p "$HOME/.kube"
                      echo "$(KUBECONFIG_B64)" | base64 -d > "$HOME/.kube/config"
                      chmod 600 "$HOME/.kube/config"

                      echo "Rolling back deployment $(APP_NAME) in $(NAMESPACE)..."
                      kubectl rollout undo deployment/$(APP_NAME) -n $(NAMESPACE)
                      kubectl rollout status deployment/$(APP_NAME) -n $(NAMESPACE) --timeout=3m

                      echo "Rollback complete. Current pods:"
                      kubectl get pods -n $(NAMESPACE) -o wide

                      rm -f "$HOME/.kube/config"
                    displayName: "Rollback on failure"
                    env:
                      KUBECONFIG_B64: $(KUBECONFIG_B64)
