name: Ansible On-Premise Deploy

# Deploys a containerised application to on-premise Linux servers using Ansible.
# Flow: build image → push to registry → ansible-playbook (pull + restart)
#
# Prerequisites:
#   - SSH private key stored as secret SSH_PRIVATE_KEY
#   - Ansible inventory files at ansible/inventories/{dev,pre,prod}/hosts.ini
#   - Ansible playbook at ansible/playbooks/deploy.yml
#   - On-premise Docker registry (or public one) configured in vars

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, pre, prod]
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        type: string
      ansible_tags:
        description: "Ansible tags to run (leave empty for full deploy)"
        required: false
        type: string
        default: ""

concurrency:
  group: ansible-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY:   ${{ vars.REGISTRY_HOST }}
  IMAGE_NAME: ${{ vars.APP_NAME }}
  APP_NAME:   ${{ vars.APP_NAME }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build image and push to registry
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build & Push → ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          [ -z "$TAG" ] && TAG="${{ github.sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy with Ansible
  #
  # The Ansible playbook (ansible/playbooks/deploy.yml):
  #   - Connects to target servers via SSH
  #   - Pulls the new image from the registry
  #   - Restarts the container (docker compose, systemd, or plain docker)
  #   - Runs a health check
  #
  # Approval gate: Settings → Environments → dev/pre/prod → Required reviewers
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Ansible Deploy → ${{ github.event.inputs.environment }}"
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      IMAGE_TAG:  ${{ needs.build.outputs.image_tag }}
      FULL_IMAGE: ${{ vars.REGISTRY_HOST }}/${{ vars.APP_NAME }}:${{ needs.build.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install --quiet ansible

      - name: Set up SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          # Disable strict host checking for the target hosts
          # Production environments should use known_hosts instead
          echo "StrictHostKeyChecking no" >> "$HOME/.ssh/config"
          echo "UserKnownHostsFile /dev/null"  >> "$HOME/.ssh/config"

      - name: Run Ansible playbook
        run: |
          TAGS_ARG=""
          if [ -n "${{ github.event.inputs.ansible_tags }}" ]; then
            TAGS_ARG="--tags ${{ github.event.inputs.ansible_tags }}"
          fi

          ansible-playbook \
            ansible/playbooks/deploy.yml \
            --inventory "ansible/inventories/${{ github.event.inputs.environment }}/hosts.ini" \
            --extra-vars "image=${{ env.FULL_IMAGE }} app_name=${{ env.APP_NAME }} env=${{ github.event.inputs.environment }}" \
            $TAGS_ARG \
            --diff

      - name: Clean up SSH key
        if: always()
        run: rm -f "$HOME/.ssh/id_rsa"
